all: false
dir: '{{.InterfaceDir}}'
filename: mocks_test.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: false
    tab-width: 2
generate: true
include-auto-generated: true
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  github.com/BlackestDawn/urlshortener/internal/repository:
    config:
      all: true
  github.com/BlackestDawn/urlshortener/internal/domain:
    config:
      all: true
      filename: mocks.go
